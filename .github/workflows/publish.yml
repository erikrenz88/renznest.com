name: Publish Analysis

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}

    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🔧 Set Up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: 🧭 Install Google Chrome
        run: |
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome-stable --version

      - name: 🔧 Set Environment for Chromote
        run: echo "CHROMOTE_CHROME=/usr/bin/google-chrome-stable" >> $GITHUB_ENV

      - name: 🔧 Set R library path
        run: |
          echo "R_LIBS_USER=$RUNNER_TEMP/Library" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/Library"

      - name: 🔧 Install Python Dependencies
        run: |
          python -m pip install -U uv
          python -m uv pip install --system -r requirements.txt polars gdown requests pandas matplotlib seaborn

      - name: 🔧 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            poppler-utils \
            libpoppler-cpp-dev

      - name: 🔧 Install Core R Dependencies
        run: |
          export R_LIBS_USER="$RUNNER_TEMP/Library"
          mkdir -p "$R_LIBS_USER"
          Rscript -e 'dir.create(Sys.getenv("R_LIBS_USER"), recursive=TRUE, showWarnings=FALSE); .libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths())); if (!requireNamespace("pak", quietly=TRUE)) install.packages("pak", repos = "https://cloud.r-project.org"); pak::pkg_install(c("rmarkdown", "knitr", "pacman", "httpuv", "jsonlite", "readr", "dplyr", "lubridate", "tidytext", "textdata", "janitor", "here"))'

      - name: 🔧 Install Geospatial R Dependencies
        run: |
          sudo apt-get install -y \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            gdal-bin
          Rscript -e '.libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths())); if (!requireNamespace("pak", quietly=TRUE)) install.packages("pak", repos = "https://cloud.r-project.org"); pak::pkg_install(c("sf", "tigris", "units", "tidycensus", "chromote", "reactable", "scales", "htmltools", "RSelenium", "readxl", "magrittr"))'

      - name: 🔧 Install reactablefmtr
        run: |
          Rscript -e '.libPaths(c(Sys.getenv("R_LIBS_USER"), .libPaths())); install.packages("reactablefmtr", repos = "https://cloud.r-project.org", dependencies = TRUE)'

      - name: 🔧 Verify R packages
        run: |
          Rscript -e 'cat(.libPaths(), sep="\n"); library(rmarkdown); cat("rmarkdown loaded\n")'

      - name: 🐐 Set Census API Key in R Session
        run: |
          echo 'Sys.setenv(CENSUS_API_KEY = Sys.getenv("CENSUS_API_KEY"))' > .Rprofile
          cat .Rprofile

      - name: 🔧 Install Quarto 1.6+
        run: |
          wget -qO- https://quarto.org/download/latest/quarto-linux-amd64.deb > quarto.deb
          sudo dpkg -i quarto.deb
          quarto check

      - name: 🏗 Build Quarto Website
        uses: quarto-dev/quarto-actions/render@v2

      - name: 📤 Publish to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site/"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write

    steps:
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
